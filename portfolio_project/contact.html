<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact page for the portfolio project">
  <title>Portfolio | Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="index.html">My Portfolio</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <main>
      <section class="hero">
        <h1>Contact Me</h1>
        <p>Feel free to reach out if you would like to collaborate.</p>
      </section>

      <section class="contact-form">
        <form>
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Your name">

          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Your email">

          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="Write your message"></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 My Portfolio</p>
    </footer>
  </div>
</body>
</html>
