<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Keyframes Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7ff, #e8f2ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .timeline-box {
      width: 180px;
      height: 180px;
      border: 8px solid #4f46e5;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      color: #1f2937;
      background: #fff;
      animation: timeline 3s ease-in-out infinite;
    }

    @keyframes timeline {
      0% {
        transform: rotate(0deg);
        border-color: #4f46e5;
      }
      50% {
        transform: rotate(180deg) scale(1.05);
        border-color: #06b6d4;
      }
      100% {
        transform: rotate(360deg) scale(1);
        border-color: #10b981;
      }
    }
  </style>
</head>
<body>
  <div class="timeline-box">Timeline</div>
</body>
</html>
