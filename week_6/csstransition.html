<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Transition Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #223;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card-wrapper {
      padding: 1rem;
      background: linear-gradient(135deg, #ffffff, #eef4ff);
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card-wrapper:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
    }

    .card {
      background: #fff;
      padding: 1.5rem;
      border-radius: 12px;
      width: 280px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="card">
      <h1>CSS Transition</h1>
      <p>Hover the card to see smooth movement, scaling, and shadow changes.</p>
    </div>
  </div>
</body>
</html>
