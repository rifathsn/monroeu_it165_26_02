<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Slideshow</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #223;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slide-card {
      width: min(720px, 90%);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      padding: 1.5rem;
      text-align: center;
    }

    img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    button {
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="slide-card">
    <img id="slideImage" src="" alt="Slideshow image">
    <h2 id="slideTitle">Slide 1</h2>
    <div class="controls">
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    const slides = [
      { title: 'Skyline', src: 'https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=900&q=80' },
      { title: 'Forest Path', src: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=80' },
      { title: 'Desert View', src: 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80' },
      { title: 'Mountain Lake', src: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=900&q=80' },
      { title: 'Ocean Coast', src: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=900&q=80' }
    ];

    let currentIndex = 0;

    const imageElement = document.getElementById('slideImage');
    const titleElement = document.getElementById('slideTitle');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function showSlide(index) {
      currentIndex = index;
      imageElement.src = slides[currentIndex].src;
      imageElement.alt = slides[currentIndex].title;
      titleElement.textContent = slides[currentIndex].title;
    }

    function showPrevious() {
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      showSlide(currentIndex);
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % slides.length;
      showSlide(currentIndex);
    }

    prevBtn.addEventListener('click', showPrevious);
    nextBtn.addEventListener('click', showNext);

    showSlide(currentIndex);
  </script>
</body>
</html>
